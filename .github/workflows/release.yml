name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses >/dev/null

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret. Run scripts/setup_release_signing.sh locally."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Configure signing
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          for var in STORE_PASSWORD KEY_PASSWORD KEY_ALIAS; do
            if [ -z "${!var}" ]; then
              echo "Missing signing secret: $var"
              exit 1
            fi
          done
          cat > keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=${STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          EOF

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify APK is signed
        run: |
          APK="app/build/outputs/apk/release/app-release.apk"
          test -f "$APK"
          APKSIGNER="$(ls -d "${ANDROID_HOME}"/build-tools/*/apksigner | sort -V | tail -n1)"
          "$APKSIGNER" verify --verbose "$APK"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: app/build/outputs/apk/release/app-release.apk
